<div class="password-field">
  <input
    type="password"
    class="password-field__input"
    id="{{ field_id }}"
    name="{{ field_name }}"
    {% if autocomplete %}autocomplete="{{ autocomplete }}"{% endif %}
    {% if placeholder %}placeholder="{{ placeholder }}"{% endif %}
    {% if minlength %}minlength="{{ minlength }}"{% endif %}
    {% if required %}required{% endif %}
    {% if aria_invalid %}aria-invalid="true"{% endif %}
    {% if value %}value="{{ value }}"{% endif %}
  >
  <button
    type="button"
    class="password-field__toggle"
    aria-label="Mostrar contraseña"
    aria-controls="{{ field_id }}"
    aria-pressed="false"
  >
    <svg class="password-field__icon password-field__icon--show" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false">
      <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
      <circle cx="12" cy="12" r="3"></circle>
    </svg>
    <svg class="password-field__icon password-field__icon--hide" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" focusable="false" hidden>
      <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"></path>
      <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"></path>
      <line x1="1" y1="1" x2="23" y2="23"></line>
      <path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"></path>
    </svg>
  </button>
</div>
