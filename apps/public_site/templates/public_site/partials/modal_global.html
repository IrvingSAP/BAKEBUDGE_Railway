<div class="bb-modal" id="bbModal" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="bbModalTitle">
  <div class="bb-modal__backdrop" data-modal-close tabindex="-1" aria-hidden="true"></div>
  <div class="bb-modal__dialog">
    <div class="bb-modal__header bb-modal__header--info" id="bbModalHeader">
      <h2 class="bb-modal__title" id="bbModalTitle">Mensaje</h2>
      <button type="button" class="bb-modal__close" data-modal-close aria-label="Cerrar">×</button>
    </div>
    <div class="bb-modal__body" id="bbModalBody"></div>
    <div class="bb-modal__footer">
      <button type="button" class="bb-modal__btn bb-modal__btn--info" id="bbModalBtn" data-modal-close>Cerrar</button>
    </div>
  </div>
</div>
